<div class="user-list-container">
  <div class="user-list-header">
    <h2>Usuarios</h2>
    <button routerLink="/dashboard/users/create" class="btn-agregar">+ Nuevo Usuario</button>
  </div>

  <!-- Estado de carga -->
  <div *ngIf="loading" class="loading-msg">Cargando usuarios...</div>

  <!-- Error global -->
  <div *ngIf="serverError" class="server-error">{{ serverError }}</div>

  <!-- Lista de usuarios -->
  <ul class="user-list" *ngIf="!loading && users.length > 0">
    <li *ngFor="let user of users" class="user-item">

      <span
        [routerLink]="['/dashboard/users', user.id]"
        class="user-link">
        {{ user.name }} {{ user.lastname }}
      </span>

      <div class="actions">
        <button
          class="btn-update"
          [routerLink]="['/dashboard/users/update', user.id]">
          Actualizar
        </button>

        <button
          class="btn-delete"
          (click)="deleteUser(user.id)">
          Eliminar
        </button>
      </div>

    </li>
  </ul>

  <!-- Mensaje cuando no hay usuarios -->
  <div *ngIf="!loading && users.length === 0 && !serverError" class="empty-msg">
    No hay usuarios registrados.
  </div>
</div>
