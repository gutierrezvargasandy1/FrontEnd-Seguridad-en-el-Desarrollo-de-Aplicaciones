<div class="create-user-container" *ngIf="!loading">

  <h2>Actualizar Usuario</h2>

  <form #userForm="ngForm" (ngSubmit)="updateUser(userForm)">

    <div class="form-group">
      <label>Nombre</label>
      <input
        type="text"
        name="name"
        [(ngModel)]="userData.name"
        #nameCtrl="ngModel"
        required
        minlength="3"
      />
      <small class="msg-error" *ngIf="fieldErrors['name']">{{ fieldErrors['name'] }}</small>
    </div>

    <div class="form-group">
      <label>Apellido</label>
      <input
        type="text"
        name="lastname"
        [(ngModel)]="userData.lastname"
        #lastnameCtrl="ngModel"
        required
        minlength="3"
      />
      <small class="msg-error" *ngIf="fieldErrors['lastname']">{{ fieldErrors['lastname'] }}</small>
    </div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input
        type="email"
        name="username"
        [(ngModel)]="userData.username"
        #usernameCtrl="ngModel"
        required
      />
      <small class="msg-error" *ngIf="fieldErrors['username']">{{ fieldErrors['username'] }}</small>
    </div>

    <div class="form-actions">
      <button type="button" (click)="goBack()" class="btn-cancelar">
        Cancelar
      </button>
      <button type="submit" [disabled]="saving" class="btn-guardar">
        {{ saving ? 'Guardando...' : 'Actualizar' }}
      </button>
    </div>

    <div *ngIf="serverError" class="msg-error">{{ serverError }}</div>

  </form>
</div>

<div *ngIf="loading" class="msg-error">
  Cargando usuario...
</div>
