<div class="register-container">
  <h2>Registro de Usuario</h2>

  <form [formGroup]="registerForm" (ngSubmit)="submit()">

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" formControlName="name">
      <small *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid">
        El nombre es obligatorio (mínimo 3 letras)
      </small>
    </div>

    <div class="form-group">
      <label>Apellido</label>
      <input type="text" formControlName="lastname">
      <small *ngIf="registerForm.get('lastname')?.touched && registerForm.get('lastname')?.invalid">
        El apellido es obligatorio (mínimo 3 letras)
      </small>
    </div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" formControlName="username">
      <small *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid">
        El usuario es obligatorio (mínimo 4 letras)
      </small>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" formControlName="password">
      <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
        La contraseña es obligatoria (mínimo 6 caracteres)
      </small>
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Registrando...' : 'Registrar' }}
    </button>

    <p class="message">{{ message }}</p>

  </form>
</div>
