<div class="dashboard">

  <nav>
    <!-- Tareas -->
    <button [routerLink]="['/dashboard/tasks']" class="btn-nav">
      📋 Tareas
    </button>

    <!-- Usuarios (solo ADMIN) -->
    <button *ngIf="isAdmin()" [routerLink]="['/dashboard/users']" class="btn-nav">
      👥 Usuarios
    </button>

    <!-- Auditoría (AMBOS ROLES, texto dinámico) -->
    <button
      *ngIf="isAdmin() || isClient()"
      [routerLink]="['/dashboard/audit-log']"
      class="btn-nav">
      🧾 {{ isAdmin() ? 'Movimientos' : 'Mis movimientos' }}
    </button>

    <!-- Perfil -->
    <button class="btn-profile" routerLink="/dashboard/profile">
      👤 Mi Perfil
    </button>

    <!-- Logout -->
    <button (click)="logout()" class="btn-logout">
      🚪 Salir
    </button>
  </nav>

  <hr>

  <router-outlet></router-outlet>

</div>
