<div class="user-list-container">
  <div class="user-list-header">
    <h2>Usuarios</h2>
    <button routerLink="/dashboard/users/create" class="btn-agregar">+ Nuevo Usuario</button>
  </div>

  <ul class="user-list">
    <li *ngFor="let user of users" class="user-item"
        [routerLink]="['/dashboard/users', user.id]">
      <div class="user-info">
        <span class="user-name">{{ user.name }} {{ user.lastname }}</span>
        <span class="user-username">{{ user.username }}</span>
      </div>
      <div class="user-actions">
        <button [routerLink]="['/dashboard/users/edit', user.id]"
                (click)="$event.stopPropagation()"
                class="btn-editar">Editar</button>
        <button (click)="deleteUser(user.id); $event.stopPropagation()"
                class="btn-eliminar">Eliminar</button>
      </div>
    </li>
  </ul>
</div>
