<div class="user-detail-container" *ngIf="user">
  <div class="detail-header">
    <h2>Detalle de Usuario</h2>
    <button routerLink="/dashboard/users" class="btn-volver">← Volver</button>
  </div>

  <div class="detail-avatar">
    {{ user.name.charAt(0).toUpperCase() }}{{ user.lastname.charAt(0).toUpperCase() }}
  </div>

  <div class="detail-body">
    <div class="detail-row">
      <span class="detail-label">Nombre completo</span>
      <span class="detail-value">{{ user.name }} {{ user.lastname }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Username</span>
      <span class="detail-value">{{ user.username }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">ID</span>
      <span class="detail-value">#{{ user.id }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Registrado</span>
      <span class="detail-value">{{ user.created_at | date:'mediumDate' }}</span>
    </div>
  </div>

  <div class="detail-footer">
    <button (click)="deleteUser(user.id)" class="btn-eliminar">Eliminar Usuario</button>
  </div>
</div>

<div *ngIf="loading" class="loading-text">Cargando usuario...</div>
<div *ngIf="error" class="msg-error">{{ error }}</div>
