<div class="update-user-container" *ngIf="user">
  <h2>Actualizar Perfil</h2>

  <form #form="ngForm" (ngSubmit)="updateProfile(form)">

    <div>
      <label>Nombre</label>
      <input type="text" name="name" [(ngModel)]="user.name" required />
    </div>

    <div>
      <label>Apellido</label>
      <input type="text" name="lastname" [(ngModel)]="user.lastname" required />
    </div>

    <div>
      <label>Username</label>
      <input type="text" name="username" [(ngModel)]="user.username" required />
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Actualizando...' : 'Actualizar' }}
    </button>

    <p *ngIf="successMessage" class="msg-success">{{ successMessage }}</p>
    <p *ngIf="errorMessage" class="msg-error">{{ errorMessage }}</p>

  </form>
</div>
